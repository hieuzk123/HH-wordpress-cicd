name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit Test (PHPUnit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer, phpunit

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml

  code-quality:
    name: Static Code Analysis (PHPCS)
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: phpcs

      - name: Create sample PHP file
        run: |
          mkdir -p wp-content/themes/my-theme
          cat > wp-content/themes/my-theme/functions.php << 'EOF'
          <?php
          /**
           * Theme setup class
           *
           * @package MyTheme
           */

          namespace MyTheme;

          /**
           * Class ThemeSetup
           */
          class ThemeSetup
          {
              /**
               * Setup theme features
               *
               * @return void
               */
              public function setup()
              {
                  add_theme_support('title-tag');
                  add_theme_support('post-thumbnails');
              }
          }
          EOF

      - name: Run PHPCS
        run: |
          phpcs --standard=PSR2 \
                --extensions=php \
                --ignore=vendor \
                wp-content/themes/my-theme/functions.php

  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/hh-wordpress:{1}', env.DOCKERHUB_USERNAME, github.sha) || 'hh-wordpress:local' }}
            ${{ env.DOCKERHUB_USERNAME != '' && format('{0}/hh-wordpress:latest', env.DOCKERHUB_USERNAME) || '' }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hh-wordpress:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hh-wordpress:latest
deploy-staging:
  needs: build
  runs-on: self-hosted
  steps:
    - name: Deploy Staging
      run: |
        cd D:\wordpress-cicd
        docker compose pull wordpress
        docker compose up -d --no-deps wordpress
        echo "Staging deployed successfully"
